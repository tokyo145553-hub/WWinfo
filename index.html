<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気象情報モニター | TEBinfo</title>
<meta name="description" content="最新気象情報を監視し、警報・注意報・台風情報の発表状況を表示するモニターです。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0e17;
    --panel: #11172a;
    --panel-alt: #161d33;
    --border: #232c47;
    --border-soft: #1a2138;
    --text: #e8ecf6;
    --text-dim: #7c88a8;
    --text-faint: #4c5674;
    --accent: #2dd4bf;
    --accent-dim: #1a8f82;
    --lv5: #ffffff;
    --lv5-bg: #050608;
    --lv5-line: #ff3b3b;
    --lv4: #b565ff;
    --lv3: #ef4444;
    --downgrade: #f5b700;
    --lift: #3b82f6;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(45,212,191,0.06), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(181,101,255,0.05), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  header{
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(10,14,23,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  /* 常時アニメーションしていた「動くバー」は視覚的なノイズになるため静的な装飾に変更 */
  .sweep{
    height: 2px;
    width: 100%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.55;
  }

  .console-inner{
    max-width: 920px;
    margin: 0 auto;
    padding: 18px 20px 16px;
  }

  .title-row{
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .title-block h1{
    margin: 0;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.02em;
    color: var(--text);
  }
  .title-block h1 .mark{ color: var(--accent); }
  .title-block .sub{
    margin-top: 3px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--mono);
    letter-spacing: 0.03em;
  }

  .clock{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.5;
  }
  .clock .time{ color: var(--text); font-size: 15px; font-weight: 600; }

  .control-row{
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .status-pill{
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    padding: 6px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text-dim);
  }
  /* ドットの点滅アニメーションを廃止し、状態は色のみで示す（静的表示） */
  .status-pill .dot{
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-faint);
    flex: none;
  }
  .status-pill.live .dot{
    background: var(--accent);
  }
  .status-pill.live{ color: var(--accent); border-color: var(--accent-dim); }

  button{
    font-family: var(--mono);
    cursor: pointer;
  }

  .btn{
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 12.5px;
    letter-spacing: 0.03em;
    padding: 7px 13px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--panel-alt);
    color: var(--text);
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  .btn:hover{ border-color: var(--accent-dim); background: #1c2440; }
  .btn:active{ transform: translateY(1px); }
  .btn:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }

  .btn.primary{
    background: var(--accent);
    color: #05221e;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover{ background: #38e5cf; }
  .btn.primary.spinning .ico{ animation: spin 0.8s linear infinite; }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .toggle{
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--panel);
    user-select: none;
  }
  .switch{
    position: relative;
    width: 30px; height: 16px;
    border-radius: 20px;
    background: #2a3358;
    border: 1px solid var(--border);
    transition: background 0.15s ease;
    flex: none;
  }
  .switch::after{
    content:"";
    position: absolute;
    top: 1px; left: 1px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .toggle input{ display:none; }
  .toggle input:checked + .switch{ background: var(--accent-dim); border-color: var(--accent); }
  .toggle input:checked + .switch::after{ transform: translateX(14px); background: #eafffb; }

  details.settings{
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-dim);
  }
  details.settings summary{
    cursor: pointer;
    list-style: none;
    color: var(--text-faint);
    letter-spacing: 0.03em;
  }
  details.settings summary::-webkit-details-marker{ display:none; }
  details.settings summary:hover{ color: var(--text-dim); }
  details.settings .settings-body{
    margin-top: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  details.settings label{ display:flex; align-items:center; gap:8px; cursor:pointer; }
  details.settings input[type=checkbox]{ accent-color: var(--accent); }

  main{
    max-width: 920px;
    margin: 0 auto;
    padding: 22px 20px 80px;
  }

  .banner{
    display:none;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    padding: 12px 14px;
    border-radius: 4px;
    margin-bottom: 18px;
    border: 1px solid #6b2f2f;
    background: #2a1414;
    color: #ffb4a8;
  }
  .banner.show{ display:block; }
  .banner a{ color: #ffd7cf; }

  /* ---------- 全国サマリーパネル（常設・毎回最新状態に上書きされる） ---------- */
  .nw-panel{
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent-dim);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .nw-panel.lv5{ border-left-color: var(--lv5-line); }
  .nw-panel.lv4{ border-left-color: var(--lv4); }
  .nw-panel.lv3{ border-left-color: var(--lv3); }
  .nw-head{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--panel-alt);
    flex-wrap: wrap;
  }
  .nw-title{
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  /* ドットは静的表示（点滅を廃止） */
  .nw-dot{
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    flex: none;
  }
  .nw-time{ font-family: var(--mono); font-size: 11.5px; color: var(--text-dim); }
  .nw-body{ padding: 13px 14px 15px; }
  .nw-body pre{
    margin: 0;
    font-family: var(--sans);
    font-size: 13.5px;
    line-height: 1.85;
    color: #d3d9ea;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ---------- 台風情報パネル ---------- */
  .ty-panel{
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent-dim);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .ty-head{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--panel-alt);
    flex-wrap: wrap;
  }
  .ty-title{
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ty-time{ font-family: var(--mono); font-size: 11.5px; color: var(--text-dim); }
  .ty-tabs{
    display: flex;
    gap: 6px;
    padding: 12px 14px 0;
    flex-wrap: wrap;
  }
  .ty-tab{
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 11px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--panel-alt);
    color: var(--text-dim);
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  .ty-tab:hover{ border-color: var(--accent-dim); color: var(--text); }
  .ty-tab.active{
    background: var(--accent);
    color: #05221e;
    border-color: var(--accent);
    font-weight: 600;
  }
  .ty-body{ padding: 13px 14px 15px; }
  .ty-feed{
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .ty-empty{
    display: none;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text-faint);
    text-align: center;
    padding: 20px 4px;
  }

  .empty-state{
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 46px 24px;
    text-align: center;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.9;
  }
  .empty-state .big{ font-size: 22px; color: var(--text-dim); margin-bottom: 6px; }

  .feed{
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card{
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--text-faint);
    border-radius: 4px;
    overflow: hidden;
    animation: enter 0.35s ease both;
  }
  .card.lv5{ border-left-color: var(--lv5-line); }
  .card.lv4{ border-left-color: var(--lv4); }
  .card.lv3{ border-left-color: var(--lv3); }
  .card.lv2{ border-left-color: var(--downgrade); }
  .card.lv1{ border-left-color: var(--lift); }
  .card.ty{ border-left-color: var(--accent); }
  .card.ty .lv-badge{ background: var(--accent); color: #05221e; }

  @keyframes enter{
    from{ opacity: 0; transform: translateY(-6px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .card-head{
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border-soft);
    background: var(--panel-alt);
  }
  .card-head-text{ min-width: 0; }
  .card-kind{
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .lv-badge{
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 2px 6px;
    border-radius: 2px;
    background: var(--text-faint);
    color: #0a0e17;
  }
  .card.lv5 .lv-badge{ background: var(--lv5); color: #0a0e17; box-shadow: 0 0 0 1px var(--lv5-line) inset; }
  .card.lv4 .lv-badge{ background: var(--lv4); color: #1a0b2e; }
  .card.lv3 .lv-badge{ background: var(--lv3); color: #2b0a0a; }
  .card.lv2 .lv-badge{ background: var(--downgrade); color: #2b2205; }
  .card.lv1 .lv-badge{ background: var(--lift); color: #06183a; }

  .card-meta{
    margin-top: 4px;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .card-meta .pref{ color: var(--text); }
  .card-meta .time{ font-family: var(--mono); }

  .copy-btn{
    flex: none;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    padding: 6px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text-dim);
    transition: all 0.15s ease;
  }
  .copy-btn:hover{ border-color: var(--accent-dim); color: var(--accent); }
  .copy-btn.copied{ border-color: var(--accent); color: var(--accent); background: rgba(45,212,191,0.08); }

  .card-body{
    padding: 13px 14px 15px;
  }
  .card-body pre{
    margin: 0;
    font-family: var(--sans);
    font-size: 13.5px;
    line-height: 1.85;
    color: #d3d9ea;
    white-space: pre-wrap;
    word-break: break-word;
  }

  footer{
    max-width: 920px;
    margin: 0 auto;
    padding: 0 20px 40px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    line-height: 1.8;
  }
  footer a{ color: var(--text-dim); }
  footer .src-line{ word-break: break-all; }

  @media (max-width: 560px){
    .console-inner{ padding: 14px 14px 12px; }
    .title-row{ flex-direction: column; align-items: flex-start; }
    .clock{ text-align: left; }
    main{ padding: 18px 14px 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="sweep" id="sweep"></div>
  <div class="console-inner">
    <div class="title-row">
      <div class="title-block">
        <h1><span class="mark">■</span> 気象情報モニター</h1>
      </div>
      <div class="clock">
        <div class="time" id="clockTime">--:--:--</div>
        <div id="clockDate">----年--月--日</div>
      </div>
    </div>

    <div class="control-row">
      <span class="status-pill" id="statusPill"><span class="dot"></span><span id="statusText">監視停止中</span></span>

      <label class="toggle">
        <input type="checkbox" id="autoToggle" checked>
        <span class="switch"></span>
        自動更新（1秒）
      </label>

      <button class="btn primary" id="refreshBtn">
        <span class="ico">⟳</span> 今すぐ更新
      </button>
    </div>

    <details class="settings">
      <summary>詳細設定</summary>
      <div class="settings-body">
        <label><input type="checkbox" id="proxyToggle"> CORSプロキシを経由して取得する（直接取得がブロックされる場合に使用）</label>
        <label><input type="checkbox" id="soundToggle"> 新規警報の受信時に通知音を鳴らす</label>
      </div>
    </details>
  </div>
</header>

<main>
  <div class="banner" id="errorBanner"></div>

  <section class="nw-panel" id="nwPanel">
    <div class="nw-head">
      <div class="nw-title"><span class="nw-dot"></span>全国の気象警報（現在発表中）</div>
      <div class="nw-time" id="nwTime">取得中…</div>
    </div>
    <div class="nw-body"><pre id="nwBodyText">全国の警報データを取得しています…</pre></div>
  </section>

  <section class="ty-panel" id="tyPanel">
    <div class="ty-head">
      <div class="ty-title"><span class="nw-dot"></span>台風情報</div>
      <div class="ty-time" id="tyTime">取得中…</div>
    </div>
    <div class="ty-tabs" id="tyTabs"></div>
    <div class="ty-body">
      <div class="copy-wrap"><button class="copy-btn" id="tyCopyBtn" type="button">⧉ コピー</button></div>
      <pre id="tyBodyText">台風情報を取得しています…</pre>
    </div>
  </section>

  <div class="empty-state" id="emptyState">
    <div class="big">監視中…</div>
    新しい警報・注意報の発表を待っています。<br>
    気象庁の発表があり次第、ここに自動的に表示されます。
  </div>

  <div class="feed" id="feed"></div>
</main>

<footer>
  <div>データ出典: 気象庁防災情報XML（<span class="src-line" id="feedUrlLabel"></span>）</div>
  <div>全国集約データ: <span class="src-line" id="nationwideUrlLabel"></span></div>
  <div>台風情報: 上記の気象庁防災情報XMLフィード内の台風実況・予報エントリを利用しています。</div>
  <div>このページは気象庁の公式サービスではありません。避難行動の判断は必ず気象庁・自治体の公式発表を確認してください。</div>
</footer>

<audio id="pingSound" preload="auto">
  <source src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAgLsAAIC7AAABAAgAZGF0YQAAAAA=" type="audio/wav">
</audio>

<script>

  function findChild(el, ns, tag){

    return null;
  }

    return Array.from(el.children).filter(c => c.namespaceURI === ns && c.localName === tag);

  function formatPubDatetime(isoStr){
    if(!isoStr) return "";
    const dt = new Date(isoStr);
    if(isNaN(dt.getTime())) return "";
    const jst = new Date(dt.getTime() + 9 * 3600 * 1000);
    const month = jst.getUTCMonth() + 1;
    const day = jst.getUTCDate();
    const hour = String(jst.getUTCHours()).padStart(2, "0");
    const minute = String(jst.getUTCMinutes()).padStart(2, "0");
    return `${month}月${day}日${hour}:${minute}`;
  }

  function formatPubDatetimeNW(dtStr){
    const dt = new Date(dtStr || Date.now());
    if(isNaN(dt.getTime())) return "";
    const month = String(dt.getMonth() + 1).padStart(2, "0");
    const day = String(dt.getDate()).padStart(2, "0");
    const hour = String(dt.getHours()).padStart(2, "0");
    const minute = String(dt.getMinutes()).padStart(2, "0");
    return `${month}月${day}日${hour}時${minute}分`;

  function getPrefectureText(head){
    const headline = findChild(head, NS.H, "Headline");
    if(!headline) return "";
    const infos = findChildren(headline, NS.H, "Information");
    const info = infos.find(i => i.getAttribute("type") === "気象警報・注意報（府県予報区等）");
    if(!info) return "";
    const names = [];
    for(const item of findChildren(info, NS.H, "Item")){
      const areas = findChild(item, NS.H, "Areas");
      if(!areas) continue;
      for(const area of findChildren(areas, NS.H, "Area")){
        const name = textOf(area, NS.H, "Name");
        if(name) names.push(name);
      }
    }
    const seen = new Set();
    const uniq = [];
    for(const n of names){ if(!seen.has(n)){ seen.add(n); uniq.push(n); } }
    return uniq.join("・");
  }

      const areaEl = findChild(item, NS.B, "Area");
      const area = areaEl ? textOf(areaEl, NS.B, "Name") : null;

      if(status === "発表警報・注意報はなし") continue;

      const isSpec = !!name && name.includes("特別警報");
      const isWarn = !!name && name.includes("警報") && !isSpec;
      const isCaution = !!name && name.includes("注意報");

      if(status === "発表"){
        if(isSpec) w.level5.iss.push(area);
        else if(isWarn) w.level3.iss.push(area);
        continue;
      }
      if(status === "継続"){
        if(isSpec) w.level5.con.push(area);
        else if(isWarn) w.level3.con.push(area);
        continue;
      }
      if(isCaution){
        if(lastName && lastName.includes("特別警報")) w.dwn5to2.push(area);
        else if(lastName && lastName.includes("警報")) w.dwn3to2.push(area);
        continue;
      }
      if(isWarn && lastName && lastName.includes("特別警報")){ w.level3.dwn5to3.push(area); continue; }
      if(status === "解除"){ w.lft.push(area); continue; }
    }

    const isEmpty = !(
      w.level5.iss.length || w.level5.con.length ||
      w.level3.iss.length || w.level3.dwn5to3.length || w.level3.con.length ||
      w.dwn5to2.length || w.dwn3to2.length || w.lft.length
    );
    if(isEmpty) return null;

    let out = "";
    if(w.level5.iss.length || w.level5.con.length){
      out += `⬛️${kindName}特別警報⬛️\n`;
      if(w.level5.iss.length) out += `【発表】${w.level5.iss.join("　")}\n`;
      if(w.level5.con.length) out += `【継続】${w.level5.con.join("　")}\n`;
      out += "\n";
    }
    if(w.level3.iss.length || w.level3.dwn5to3.length || w.level3.con.length){
      out += `🟥${kindName}警報🟥\n`;
      if(w.level3.iss.length) out += `【発表】${w.level3.iss.join("　")}\n`;
      if(w.level3.dwn5to3.length) out += `【特別警報から警報】${w.level3.dwn5to3.join("　")}\n`;
      if(w.level3.con.length) out += `【継続】${w.level3.con.join("　")}\n`;
      out += "\n";
    }
    if(w.dwn5to2.length){ out += `🟨${kindName}特別警報から注意報🟨\n${w.dwn5to2.join("　")}\n\n`; }
    if(w.dwn3to2.length){ out += `🟨${kindName}警報から注意報🟨\n${w.dwn3to2.join("　")}\n\n`; }
    if(w.lft.length){ out += `🟦${kindName}警報等解除🟦\n${w.lft.join("　")}\n\n`; }

    const message = buildMessage(kindName, prefectureText, pub, headlineText, notice, out);
    const level = severityLevel(
      w.level5.iss.length || w.level5.con.length,
      false,
      w.level3.iss.length || w.level3.dwn5to3.length || w.level3.con.length,
      w.dwn5to2.length || w.dwn3to2.length,
      w.lft.length
    );

    return { kindName, prefectureText, pub, message, level };
  }

  function buildMessage(kindName, prefectureText, pub, headlineText, notice, out){
    let msg = `《気象警報（${kindName}）》\n${prefectureText}\n${pub} 発表`;
    if(headlineText) msg += `\n\n${headlineText}`;
    if(notice) msg += `\n${notice}`;
    msg += `\n\n${out}`;
    return msg.replace(/\n+$/, "");
  }

  function createWarnInfoTemplate(warnArea){
    const warnByTypeAndArea = {};
    for(const info of Object.values(warnArea)){
      if(!info.name || info.name === "解除" || info.name === "未定・予約") continue;
      warnByTypeAndArea[info.name] = {};
    }
    return warnByTypeAndArea;
  }

  async function getAreaData(){
    if(!areaDataCache){
      const res = await fetch(proxied(AREA_JSON_URL), {cache:"no-store"});
      if(!res.ok) throw new Error(`地域定義JSONの取得に失敗しました: ${res.status}`);
      areaDataCache = await res.json();
    }
    return areaDataCache;
  }

  function getRegionNameNW(regionCode){
    for(const name in regionCodeByName){
      if(regionCodeByName[name] === regionCode) return name;
    }
    return regionCode;
  }

  function getWarnColorNW(level){
    switch(level){
      case 2: return "🟨";
      case 3: return "🟥";
      case 4: return "🟪";
      case 5: return "⬛️";
      default: return "◆";
    }
  }

  async function fetchAllR8WarningData(){
    const regionCodes = Object.values(regionCodeByName);
    const results = await Promise.all(regionCodes.map(async regionCode => {
      const url = `${WARNING_R8_BASE_URL}/${regionCode}.json`;
      try{
        const res = await fetch(proxied(url), {cache:"no-store"});
        if(!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        const reports = await res.json();
        return reports.map(report => ({...report, regionCode}));
      }catch(e){
        console.warn(`警報JSON取得失敗: ${url}`, e);
        return [];
      }
    }));
    return results.flat();
  }

  async function getNationwideWarnings(){
    const areaData = await getAreaData();
    const warnByTypeAndArea = createWarnInfoTemplate(NATIONWIDE_WARN_AREA);
    let reportDatetime = "";
    let publishingOffice = "";

    const dataJson = await fetchAllR8WarningData();

    for(const item of dataJson){
      if(!item || !item.warning) continue;
      if(reportDatetime === "" || item.reportDatetime > reportDatetime){
        reportDatetime = item.reportDatetime;
        publishingOffice = item.publishingOffice || publishingOffice;
      }

      const largeAreaName = getRegionNameNW(item.regionCode);

      for(const area of item.warning.class20Items || []){
        const cityInfo = areaData.class20s?.[area.areaCode];
        if(!cityInfo) continue;
        const cityName = cityInfo.name;

        for(const w of area.kinds || []){
          if(!w.code || w.status === "解除") continue;
          const info = NATIONWIDE_WARN_AREA[w.code];
          if(!info) continue;
          const warnName = info.name;
          if(!warnName || !warnByTypeAndArea[warnName]) continue;

          if(!warnByTypeAndArea[warnName][largeAreaName]) warnByTypeAndArea[warnName][largeAreaName] = [];
          if(!warnByTypeAndArea[warnName][largeAreaName].includes(cityName)){
            warnByTypeAndArea[warnName][largeAreaName].push(cityName);
          }
        }
      }
    }

    return { reportDatetime, publishingOffice, warnInfo: warnByTypeAndArea };
  }

  function buildNationwideCard(data){
    const sortedWarnNames = [
      ...NATIONWIDE_WARN_ORDER.filter(name => data.warnInfo[name]),
      ...Object.keys(data.warnInfo).filter(name => !NATIONWIDE_WARN_ORDER.includes(name))
    ];

    let content = "";
    let count = 0;
    let maxLevel = 0;

    for(const warnName of sortedWarnNames){
      const areas = data.warnInfo[warnName];
      if(Object.keys(areas).length === 0) continue;

      const info = Object.values(NATIONWIDE_WARN_AREA).find(w => w.name === warnName);
      if(!info || info.level === null || info.level < NATIONWIDE_MIN_LEVEL) continue;

      let block = "";
      let hasArea = false;

      for(const areaName in areas){
        const cities = areas[areaName];
        if(!cities || cities.length === 0) continue;

        if(!hasArea){
          const mark = getWarnColorNW(info.level);
          block += `\n\n${mark}${warnName}${mark}`;
          hasArea = true;
          count++;
          if(info.level > maxLevel) maxLevel = info.level;
        }
        block += `\n【${areaName}】\n`;
        block += cities.join("　");
      }
      content += block;
    }

    if(count === 0) return null;

    content = content.trim();
    const pub = formatPubDatetimeNW(data.reportDatetime);

    return {
      kindName: "全国集約",
      prefectureText: "全国",
      pub,
      message: `《全国の気象警報》\n${pub}　更新\n\n${content}`,
      level: maxLevel,
      content,
    };
  }

  // 全国サマリーパネル（常設。差分の有無にかかわらず毎回最新状態へ上書きする）
  function renderNationwideSummary(card){
    el.nwPanel.className = "nw-panel" + (card ? ` lv${card.level}` : "");
    el.nwTime.textContent = card ? `${card.pub} 更新` : "監視中…（現在アクティブな警報はありません）";
    el.nwBodyText.textContent = card
      ? card.content
      : "現在、全国で警報・危険警報・特別警報の発表はありません。";
  }

  async function runNationwideCycle(){
    if(state.nwRunning) return;
    state.nwRunning = true;
    try{
      const data = await getNationwideWarnings();
      const card = buildNationwideCard(data);

      // パネルは差分の有無にかかわらず毎回更新する。
      // これにより、ページを開いた瞬間（初回表示）から必ず全国の現況が見える。
      renderNationwideSummary(card);

      if(!card){
        lastNationwideContent = null;
        return;
      }

      if(card.content !== lastNationwideContent){
        lastNationwideContent = card.content;
        renderCard(card);
      }
    }catch(err){
      console.error("[全国集約取得エラー]", err);
      el.nwTime.textContent = "取得エラー";
    }finally{
      state.nwRunning = false;
    }
  }

  async function fetchTyphoonHrefs(){
    const feedText = await fetchText(FEED_URL);
    const parser = new DOMParser();
    const feedXml = parser.parseFromString(feedText, "text/xml");
    const entries = [...feedXml.getElementsByTagName("entry")];

    const hrefs = [];
    const seen = new Set();

    // 第1パス: 実況
    for(const entry of entries){
      if(hrefs.length >= TYPHOON_MAX) break;
      const title = entry.getElementsByTagName("title")[0]?.textContent || "";
      const link = entry.getElementsByTagName("link")[0]?.getAttribute("href");
      if(title.includes("台風") && title.includes("実況") && link && !seen.has(link)){
        seen.add(link);
        hrefs.push(link);
      }
    }

    // 第2パス: 予報
    if(hrefs.length < TYPHOON_MAX){
      for(const entry of entries){
        if(hrefs.length >= TYPHOON_MAX) break;
        const title = entry.getElementsByTagName("title")[0]?.textContent || "";
        const link = entry.getElementsByTagName("link")[0]?.getAttribute("href");
        if(title.includes("台風") && title.includes("予報") && link && !seen.has(link)){
          seen.add(link);
          hrefs.push(link);
        }
      }
    }

    return hrefs;
  }

  async function fetchTyphoonDetail(href){
    const detailText = await fetchText(href);
    const parser = new DOMParser();
    const detailXml = parser.parseFromString(detailText, "text/xml");

    let number = null;
    let isTD = false; // 台風番号または台風名が確認できない場合は熱帯低気圧として扱う
    let name = "不明";
    let size = "--";
    let intensity = "--";
    let pressure = "不明";
    let wind = "―";
    let gust = "―";
    let direction = "不明";
    let speedText = "不明";
    let area = "不明";

    const numberNode = detailXml.querySelector("Number");
    if(numberNode){
      const raw = numberNode.textContent || "";
      const parsed = parseInt(raw.slice(-2), 10);
      if(isNaN(parsed)){
        isTD = true;
      }else{
        number = parsed;
      }
    }else{
      isTD = true;
    }

    const nameNode = detailXml.querySelector("Name");
    if(nameNode && nameNode.textContent && nameNode.textContent.trim() !== ""){
      name = nameNode.textContent.trim();
    }else{
      isTD = true;
    }

    const info = detailXml.querySelector("MeteorologicalInfo");

    if(info){

      const areaClass = info.querySelector("AreaClass");
      if(areaClass?.textContent) size = areaClass.textContent;

      const intensityClass = info.querySelector("IntensityClass");
      if(intensityClass?.textContent) intensity = intensityClass.textContent;

      const location = info.querySelector("CenterPart Location");
      if(location?.textContent) area = location.textContent;

      const pressureNode = info.querySelector("Pressure");
      if(pressureNode?.textContent) pressure = pressureNode.textContent;

      const directionNode = info.querySelector("Direction");
      if(directionNode?.textContent) direction = directionNode.textContent;

      const speedNode = [...info.querySelectorAll("Speed")].find(x => x.getAttribute("unit") === "km/h");
      if(speedNode){
        const speed = speedNode.textContent;
        const desc = speedNode.getAttribute("description");
        if(desc?.includes("ゆっくり")){
          speedText = "ゆっくり";
        }else if(desc?.includes("ほとんど停滞")){
          speedText = "ほとんど停滞";
        }else{
          speedText = speed + " km/h";
        }
      }

      const windNodes = [...info.querySelectorAll("WindSpeed")];
      windNodes.forEach(node => {
        const unit = node.getAttribute("unit");
        const type = node.getAttribute("type") || "";
        if(unit === "m/s" && (!type || type.includes("最大風速"))) wind = node.textContent;
        if(unit === "m/s" && type.includes("最大瞬間風速")) gust = node.textContent;
      });
    }

    return { number, isTD, name, size, intensity, pressure, wind, gust, direction, speedText, area };
  }

  function buildTyphoonText(t){
    const headerLines = t.isTD
      ? ["熱帯低気圧"]
      : [`台風${t.number}号`, `台風名　${t.name}`];

    return [
      "【台風情報】",
      ...headerLines,
      `大きさ　${t.size}`,
      `強さ　${t.intensity}`,
      `存在地域　${t.area}`,
      `中心気圧　${t.pressure} hPa`,
      `最大風速　${t.wind} m/s`,
      `最大瞬間風速　${t.gust} m/s`,
      `移動方向　${t.direction}`,
      `移動速度　${t.speedText}`
    ].join("\n");
  }

  async function runTyphoonCycle(){
    if(state.tyRunning) return;
    state.tyRunning = true;
    try{
      const hrefs = await fetchTyphoonHrefs();

      if(hrefs.length === 0){
        tyState.entries = [];
        tyState.texts = [];
        tyState.selectedIndex = 0;
        renderTyphoonTabs();
        renderTyphoonBody();
        return;
      }

      const details = await Promise.all(hrefs.map(href => fetchTyphoonDetail(href)));

      if(tyState.selectedIndex >= details.length) tyState.selectedIndex = 0;

      tyState.entries = details;
      tyState.texts = details.map(buildTyphoonText);

      renderTyphoonTabs();
      renderTyphoonBody();
    }catch(err){
      console.error("[台風情報取得エラー]", err);
      el.tyTime.textContent = "取得エラー";
    }finally{
      state.tyRunning = false;
    }
  }

  const FUNC_TABLE = {
    vpww55: parseVpww55_56_57,
    vpww58: parseVpww58,
    vpww59: parseVpww59_60,
  };
  const FUNC_MAP_PATTERNS = [
    [/VPWW55/, "vpww55"],
    [/VPWW56/, "vpww55"],
    [/VPWW57/, "vpww55"],
    [/VPWW58/, "vpww58"],
    [/VPWW59/, "vpww59"],
    [/VPWW60/, "vpww59"],
  ];
  function resolveFunctionName(href){
    for(const [pattern, fnName] of FUNC_MAP_PATTERNS){
      if(pattern.test(href)) return fnName;
    }
    return null;
  }

  const state = {
    sentIds: [],
    sentSet: new Set(),
    autoOn: true,
    running: false,
    nwRunning: false,
    tyRunning: false,
    timerId: null,
    nationwideTimerId: null,
    tyTimerId: null,
  };

    entries: [],
    texts: [],
    selectedIndex: 0,
  };

    feed: document.getElementById("feed"),
    emptyState: document.getElementById("emptyState"),

  function proxied(url){

  }

  async function fetchText(url){
    const res = await fetch(proxied(url), { cache: "no-store" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.text();

  function renderCard(card){
    el.emptyState.style.display = "none";

    const wrap = document.createElement("div");
    wrap.className = `card lv${card.level}`;

    const badgeLabel = ["解除等", "解除等", "注意報引き下げ", "警報", "危険警報", "特別警報"][card.level] || "情報";

    wrap.innerHTML = `
      <div class="card-head">
        <div class="card-head-text">
          <div class="card-kind">
            <span class="lv-badge">${badgeLabel}</span>
            気象警報（${escapeHtml(card.kindName || "情報")}）
          </div>
          <div class="card-meta">
            <span class="pref">${escapeHtml(card.prefectureText || "")}</span>
            <span class="time">${escapeHtml(card.pub || "")} 発表</span>
          </div>
        </div>
        <button class="copy-btn" type="button">⧉ コピー</button>
      </div>
      <div class="card-body"><pre></pre></div>
    `;
    wrap.querySelector(".card-body pre").textContent = card.message;

    const copyBtn = wrap.querySelector(".copy-btn");
    copyBtn.addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText(card.message);
        copyBtn.classList.add("copied");
        copyBtn.textContent = "✓ コピーしました";
        setTimeout(() => {
          copyBtn.classList.remove("copied");
          copyBtn.textContent = "⧉ コピー";
        }, 1600);
      }catch(e){
        const range = document.createRange();
        const pre = wrap.querySelector(".card-body pre");
        range.selectNodeContents(pre);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        copyBtn.textContent = "選択済み（Ctrl+C）";
        setTimeout(() => { copyBtn.textContent = "⧉ コピー"; }, 2000);
      }
    });

    el.feed.prepend(wrap);

    while(el.feed.children.length > MAX_VISIBLE_CARDS){
      el.feed.removeChild(el.feed.lastChild);
    }

    if(el.soundToggle.checked){
      el.pingSound.currentTime = 0;
      el.pingSound.play().catch(() => {});
    }
  }

  function escapeHtml(s){
    return (s || "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  async function runCycle(){
    if(state.running) return;
    state.running = true;
    el.refreshBtn.classList.add("spinning");

    try{
      const feedText = await fetchText(FEED_URL);
      const feedRoot = parseXmlRoot(feedText);
      const entries = findChildren(feedRoot, NS.ATOM, "entry");

      const targets = [];
      for(const entry of entries){
        const link = findChild(entry, NS.ATOM, "link");
        if(!link) continue;
        const href = link.getAttribute("href");
        if(!href) continue;
        const fnName = resolveFunctionName(href);
        if(fnName){
          targets.push([href, fnName]);
          if(targets.length >= MAX_TARGETS_PER_CYCLE) break;
        }
      }

      const orderedTargets = targets.slice().reverse();

      for(const [href, fnName] of orderedTargets){
        const fileName = href.replace(/\/$/, "").split("/").pop();
        if(state.sentSet.has(fileName)) continue;

        state.sentSet.add(fileName);
        state.sentIds.push(fileName);
        while(state.sentIds.length > MAX_SENT_IDS){
          const old = state.sentIds.shift();
          state.sentSet.delete(old);
        }

        try{
          const itemText = await fetchText(href);
          const itemRoot = parseXmlRoot(itemText);
          const fn = FUNC_TABLE[fnName];
          const card = fn(itemRoot);
          if(card){
            renderCard(card);
          }
        }catch(itemErr){
          console.error("[警報処理エラー]", fnName, itemErr);
        }
      }

      clearError();
      setStatus(state.autoOn, state.autoOn ? "監視中" : "手動モード");
    }catch(err){
      console.error("[フィード取得エラー]", err);
      setStatus(false, "取得エラー");
      showError(
        `フィードの取得に失敗しました（${escapeHtml(String(err.message || err))}）。<br>` +
        `気象庁サーバーがブラウザからの直接アクセスをブロックしている可能性があります。` +
        `「詳細設定」から <b>CORSプロキシを経由して取得する</b> を有効にして再度お試しください。`
      );
    }finally{
      state.running = false;
      el.refreshBtn.classList.remove("spinning");
    }
  }

  function startTimer(){
    stopTimer();
    state.timerId = setInterval(runCycle, POLL_INTERVAL_MS);
    state.nationwideTimerId = setInterval(runNationwideCycle, NATIONWIDE_POLL_INTERVAL_MS);
    state.tyTimerId = setInterval(runTyphoonCycle, TYPHOON_POLL_INTERVAL_MS);
  }
  function stopTimer(){
    if(state.timerId){ clearInterval(state.timerId); state.timerId = null; }
    if(state.nationwideTimerId){ clearInterval(state.nationwideTimerId); state.nationwideTimerId = null; }
    if(state.tyTimerId){ clearInterval(state.tyTimerId); state.tyTimerId = null; }
  }

  el.autoToggle.addEventListener("change", () => {
    state.autoOn = el.autoToggle.checked;
    if(state.autoOn){
      if(!document.hidden) startTimer();
      setStatus(true, "監視中");
    }else{
      stopTimer();
      setStatus(false, "監視停止中");
    }
  });

  el.refreshBtn.addEventListener("click", () => { runNationwideCycle(); runTyphoonCycle(); runCycle(); });

  document.addEventListener("visibilitychange", () => {
    if(document.hidden){
      stopTimer();
    }else if(state.autoOn){
      runNationwideCycle();
      runTyphoonCycle();
      runCycle();
      startTimer();
    }
  });

  function tickClock(){
    const d = new Date();
    el.clockTime.textContent = d.toLocaleTimeString("ja-JP", { hour12: false });
    el.clockDate.textContent = d.toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric", weekday: "short" });
  }
  tickClock();
  setInterval(tickClock, 1000);

  // 全国サマリー・台風情報 → 個別フィード の順で「待ってから」実行することで、
  // ページを開いた直後は必ず全国の気象警報サマリーと台風情報が最初に表示されるようにする。
  async function init(){
    setStatus(true, "監視中");
    await Promise.all([runNationwideCycle(), runTyphoonCycle()]);
    await runCycle();
    startTimer();
  }
  init();
})();
</script>
</body>
</html>
